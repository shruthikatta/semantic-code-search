services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: scs-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=scs-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: scs-backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ES_INDEX=${ES_INDEX:-code_chunks}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-jinaai/jina-embeddings-v2-base-code}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
      - INDEX_BULK_CHUNK_SIZE=${INDEX_BULK_CHUNK_SIZE:-200}
      - INDEXER_MAX_FILE_BYTES=${INDEXER_MAX_FILE_BYTES:-2097152}
      - EMBEDDING_TRUST_REMOTE_CODE=${EMBEDDING_TRUST_REMOTE_CODE:-false}
      - HF_HOME=/models
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./samples:/samples:ro
      - hf-cache:/models
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    container_name: scs-frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  es-data:
  hf-cache:
